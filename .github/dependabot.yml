# Dependabot config. See:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions. Weekly cadence picks up action releases — notably the
  # Node.js 20 → 24 migrations that upstream actions publish as minor/patch
  # bumps and that resolve the current Unit Tests CI deprecation notice.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 3

  # Gradle dependencies in build.gradle. Monthly cadence since test-only
  # changes don't need aggressive freshness, and the set is small.
  #
  # Pinned intentionally (see ignores below):
  #   - groovy-all stays on the 3.0.x line — matches eighty20results/hubitat_ci's
  #     compiled-against version (3.0.21) for consumer compatibility.
  #   - spock-core uses the "-groovy-3.0" variant suffix, which Dependabot
  #     doesn't model as a version coordinator; manual bump only.
  #   - com.github.eighty20results:hubitat_ci is served by JitPack and pinned
  #     by release tag (e.g. v0.28.6). eighty20results cuts git tags, but
  #     JitPack/Dependabot interop on tag-based version discovery is flaky,
  #     so we keep the manual bump tracked by the hubitat-ci-version-check
  #     workflow rather than relying on Dependabot here.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "org.codehaus.groovy:groovy-all"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
      - dependency-name: "org.spockframework:spock-core"
      - dependency-name: "com.github.eighty20results:hubitat_ci"
    groups:
      gradle-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 2
