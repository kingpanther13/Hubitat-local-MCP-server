name: Post-merge automation
on:
  push:
    branches: [main]

# Single concurrency group covers both the version-bump release path and the
# futureplans-to-README sync path so they cannot race against each other.
concurrency:
  group: post-merge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Short-circuit on the bot's own pushes (release commits, futureplans-sync
      # commits) so we don't recurse. The push event fires again when the bot's
      # commit lands on main.
      - name: Guard against bot-commit recursion
        id: precheck
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
        run: |
          set -euo pipefail
          # Author identity is the load-bearing check — the bot is the only
          # actor that produces these commits. The commit-message pattern
          # match below is informational/defense-in-depth; gating it on
          # author=bot avoids the false-positive where a human PR squash-
          # merged with a title like "chore(release): tweak versioning"
          # would otherwise be silently skipped (and a release-labeled
          # follow-up PR's release would never run).
          if [ "$COMMIT_AUTHOR_NAME" = "github-actions[bot]" ]; then
            FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
            case "$FIRST_LINE" in
              "chore(release):"*|"docs: sync Future Plans"*)
                echo "::notice::Bot-authored bookkeeping commit (${FIRST_LINE}) — skipping to avoid loop"
                ;;
              *)
                echo "::notice::Push authored by github-actions[bot] (non-bookkeeping message) — skipping to avoid loop"
                ;;
            esac
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # Trigger is `push: main` (not `pull_request: closed`) so the workflow
      # gets the base repo's `contents` permission regardless of where the
      # merged code came from. We recover the originating PR via the
      # commits-to-PRs API for label inspection and changed-file detection.
      - name: Resolve PR from merge commit
        if: steps.precheck.outputs.skip == 'false'
        id: pr
        env:
          SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # GitHub's commit-to-PR index is eventually consistent. Retry with
          # backoff so a fast-firing push event doesn't see an empty result.
          PR_JSON=""
          for attempt in 1 2 3 4 5; do
            PR_JSON=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/pulls" --jq '.[0] // empty')
            if [ -n "$PR_JSON" ]; then
              echo "commits-to-PR lookup succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "Attempt $attempt returned empty, retrying in 6s..."
              sleep 6
            fi
          done
          if [ -z "$PR_JSON" ]; then
            echo "::notice::No PR associated with ${SHA} after 5 attempts — direct push or unrelated event, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
          PR_AUTHOR_ID=$(echo "$PR_JSON" | jq -r '.user.id')
          LABELS_JSON=$(echo "$PR_JSON" | jq -c '.labels')
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "author=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "author_id=$PR_AUTHOR_ID" >> "$GITHUB_OUTPUT"
          {
            echo "labels_json<<__EOF__"
            echo "$LABELS_JSON"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Determine release label
        if: steps.pr.outputs.skip == 'false'
        id: label
        env:
          LABELS_JSON: ${{ steps.pr.outputs.labels_json }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          RELEASE_LABELS=$(echo "$LABELS_JSON" | jq -r '[.[] | select(.name | startswith("release:")) | .name]')
          COUNT=$(echo "$RELEASE_LABELS" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "::notice::PR #${PR_NUMBER} has no release:* label — skipping version bump (futureplans sync may still run)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$COUNT" -gt 1 ]; then
            echo "::error::Multiple release:* labels found on PR #${PR_NUMBER}; expected exactly one: $RELEASE_LABELS"
            exit 1
          fi
          LABEL=$(echo "$RELEASE_LABELS" | jq -r '.[0]')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Detect futureplans.md change
        if: steps.pr.outputs.skip == 'false'
        id: fp
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Capture the API call into a file first so a transient gh failure
          # is distinguishable from "no match" (piping straight into grep
          # would silently report changed=false on API error because grep's
          # exit-1 lands in the same `else` branch as a real no-match).
          FILES_LIST=$(mktemp) || { echo "::error::mktemp failed"; exit 1; }
          # EXIT trap cleans up unconditionally (including the early exit
          # on API failure below). GitHub-hosted runners are ephemeral so
          # this is hygiene, not a real leak prevention.
          trap 'rm -f "$FILES_LIST"' EXIT
          if ! gh api "/repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" --paginate --jq '.[].filename' > "$FILES_LIST"; then
            echo "::error::Failed to list changed files for PR #${PR_NUMBER}"
            exit 1
          fi
          if grep -qx 'futureplans.md' "$FILES_LIST"; then
            echo "::notice::futureplans.md changed in PR #${PR_NUMBER} — will sync FUTURE_PLANS block in README"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no work to do
        if: steps.pr.outputs.skip == 'false'
        id: skip_all
        env:
          RELEASE_SKIP: ${{ steps.label.outputs.skip }}
          FP_CHANGED: ${{ steps.fp.outputs.changed }}
        run: |
          set -euo pipefail
          if [ "$RELEASE_SKIP" != "false" ] && [ "$FP_CHANGED" != "true" ]; then
            echo "::notice::No release label and futureplans.md unchanged — nothing to do"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Fail loud if the deploy-key secret is empty/unset — actions/checkout
      # would silently fall back to GITHUB_TOKEN HTTPS, which the
      # main-required-checks ruleset rejects.
      - name: Verify deploy key secret is set
        if: steps.skip_all.outputs.skip == 'false'
        env:
          SECRET: ${{ secrets.RELEASE_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SECRET:-}" ]; then
            echo "::error::RELEASE_DEPLOY_KEY secret is empty or unset — actions/checkout would silently fall back to GITHUB_TOKEN HTTPS, which is rejected by the main-required-checks ruleset."
            exit 1
          fi

      - name: Checkout main via deploy key
        if: steps.skip_all.outputs.skip == 'false'
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          # Deploy key is the only actor allowed to bypass the main-branch
          # ruleset's required status checks (DeployKey bypass actor matches
          # any deploy key on the repo). GITHUB_TOKEN would push as
          # github-actions[bot], which is not in the bypass list, and the
          # ruleset would reject the push.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      # Sync futureplans → README runs BEFORE setup-python so the python step
      # below isn't installed when only release work is needed. The sync's own
      # python invocation uses the runner's preinstalled python3.
      - name: Sync futureplans.md into README
        if: steps.fp.outputs.changed == 'true'
        run: |
          set -euo pipefail
          # Read futureplans.md, strip the top-level heading (line 1),
          # and demote all headings by one level (## -> ###, ### -> ####)
          CONTENT=$(tail -n +2 futureplans.md | sed 's/^### /#### /; s/^## /### /')

          # Build the replacement block with marker comments. Wrap in <details>
          # so it renders collapsed on GitHub — the body is large and speculative.
          REPLACEMENT="<!-- FUTURE_PLANS_START -->"
          REPLACEMENT+=$'\n'"<details>"
          REPLACEMENT+=$'\n'"<summary><h2>Future Plans</h2></summary>"$'\n\n'
          REPLACEMENT+="$CONTENT"
          REPLACEMENT+=$'\n\n'"</details>"
          REPLACEMENT+=$'\n'"<!-- FUTURE_PLANS_END -->"

          # Replace everything between the markers in README.md.
          # The marker-existence guard distinguishes "regex matched but content
          # identical" (legitimate no-op) from "markers missing" (broken README)
          # so a future README edit that drops the markers fails loudly here
          # instead of silently no-op'ing every subsequent sync run.
          python3 -c "
          import re, sys

          with open('README.md', 'r') as f:
              readme = f.read()

          with open('/dev/stdin', 'r') as f:
              replacement = f.read()

          pattern = r'<!-- FUTURE_PLANS_START -->.*?<!-- FUTURE_PLANS_END -->'
          if not re.search(pattern, readme, flags=re.DOTALL):
              sys.exit('ERROR: FUTURE_PLANS markers missing in README.md — restore the <!-- FUTURE_PLANS_START --> / <!-- FUTURE_PLANS_END --> comment pair before this workflow can run.')

          updated = re.sub(pattern, replacement, readme, flags=re.DOTALL)

          if updated == readme:
              print('No changes needed.')
              sys.exit(0)

          with open('README.md', 'w') as f:
              f.write(updated)

          print('README.md updated.')
          " <<< "$REPLACEMENT"

      - uses: actions/setup-python@v7
        if: steps.label.outputs.skip == 'false'
        with:
          python-version: '3.x'

      - name: Bump version and rewrite files
        if: steps.label.outputs.skip == 'false'
        id: bump
        env:
          LABEL: ${{ steps.label.outputs.label }}
          TRIGGER_PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/release_bump.py

      # Single push at the end. Either branch produces ONE commit on main:
      # - Release path: chore(release): X.Y.Z (may include the FUTURE_PLANS
      #   block change if futureplans.md was also touched in the PR; both
      #   land together because release_bump.py only edits README's Version
      #   History section, leaving the FUTURE_PLANS block intact).
      # - Sync-only path: docs: sync Future Plans from futureplans.md.
      - name: Commit, tag, and push
        if: steps.skip_all.outputs.skip == 'false'
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          PR_AUTHOR_ID: ${{ steps.pr.outputs.author_id }}
          RELEASE_SKIP: ${{ steps.label.outputs.skip }}
          FP_CHANGED: ${{ steps.fp.outputs.changed }}
        run: |
          set -euo pipefail
          # Canonical noreply form (with the bot's user-ID prefix) so GitHub's
          # UI attributes the commit to github-actions[bot] rather than showing
          # "unrecognized author".
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$RELEASE_SKIP" = "false" ]; then
            # Release path: stage all release-bump files. README.md may carry
            # both Version History (from release_bump.py) and FUTURE_PLANS (from
            # the sync step) edits — both land in the same chore(release) commit.
            git add CHANGELOG.md README.md packageManifest.json hubitat-mcp-server.groovy hubitat-mcp-rule.groovy
            git commit \
              -m "chore(release): ${NEW_VERSION}" \
              -m "Co-authored-by: ${PR_AUTHOR} <${PR_AUTHOR_ID}+${PR_AUTHOR}@users.noreply.github.com>"
            # Annotated tag + explicit tag push (--follow-tags silently skips
            # lightweight tags; this was the v0.9.3 regression).
            git tag -a "v${NEW_VERSION}" -m "Release ${NEW_VERSION}"
            git push origin main
            git push origin "v${NEW_VERSION}"
          elif [ "$FP_CHANGED" = "true" ]; then
            # Sync-only path: only README's FUTURE_PLANS block changed.
            # Python sync may have produced no diff (e.g. the futureplans edit
            # was a no-op against the current README block) — skip the commit
            # rather than fail.
            if git diff --quiet README.md; then
              echo "::notice::futureplans edit produced no README diff — nothing to commit"
              exit 0
            fi
            git add README.md
            git commit -m "docs: sync Future Plans from futureplans.md"
            git push origin main
          fi
