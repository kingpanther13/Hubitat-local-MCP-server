name: Sandbox Lint
on:
  pull_request:
    branches: [main]
    paths:
      - '*.groovy'
      - 'packageManifest.json'
      - 'tests/sandbox_lint.py'
      - 'libraries/**'
      - 'bundles/**'
      - 'tools/build-bundle.py'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Sandbox-lint scan
        run: python tests/sandbox_lint.py
      # Bundle build smoke (issue #209): PRs do not commit bundles/mcp-libraries.zip -- the
      # rebuild-bundle.yml workflow regenerates and commits it on main post-merge, which is
      # what keeps the raw-main URL in packageManifest.json fresh without every library-touching
      # PR conflicting on the binary zip. This step only proves the builder still RUNS against
      # the PR's libraries/ (a broken LIBS entry or unreadable library fails here, in-PR).
      - name: Bundle builder runs against the PR's libraries
        run: python tools/build-bundle.py
