name: Hub E2E (test hub)

# End-to-end tests against a real Hubitat hub provided by @level99
# (see issue #77 + the GitHub secret LEVEL99_TEST_HUB_MCP_URL).
#
# Failure mode: BLOCKING. Per the maintainer this check is required for merge --
# a red e2e means the change could not be proven against a real hub, so it gates.
#
# Trigger is pull_request_target (NOT pull_request) so the run executes in the base
# repo's trusted context and therefore has the hub secret even for fork PRs -- the
# only way to auto-run e2e on a contributor's fork. The workflow file itself always
# comes from the base branch under pull_request_target, so a PR cannot alter the CI
# logic; it can only change the app source / tests that get deployed and run, which
# is gated for untrusted authors by the `approve` job below.
#
# Who runs automatically vs. who waits for approval is decided by the `approve` job's
# environment selection. When the hub secret genuinely isn't configured (someone
# forked the whole project without a donated test hub) the e2e job skips cleanly
# rather than failing -- see the secret gate inside it. A confirmed infra/flake
# failure is triaged by the maintainer, not auto-ignored.

on:
  pull_request_target:
    branches: [main]
    # Skip when only docs / non-test files change. Cuts CI cost on
    # README-only / SKILL-only PRs that can't break the hub-side surface.
    paths:
      - 'hubitat-mcp-server.groovy'
      - 'hubitat-mcp-rule.groovy'
      - 'e2e-deadman-watchdog.groovy'
      - 'e2e-deadman-watchdog-v2.groovy'
      - 'tests/e2e_test.py'
      - '.github/workflows/hub-e2e.yml'
      - '.github/scripts/lease_acquire.sh'
      - '.github/scripts/lease_release.sh'
      - '.github/scripts/mcp_setup_env.sh'
      - '.github/scripts/mcp_restore_env.sh'
      - '.github/scripts/mcp_validate_package_tool.sh'
      - '.github/scripts/mcp_watchdog_lib.sh'
      - '.github/scripts/mcp_watchdog_deploy.sh'
      - '.github/scripts/mcp_arm_watchdog.sh'
      - '.github/scripts/mcp_disarm_watchdog.sh'
      - 'libraries/**'
      - 'bundles/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (blank = current ref)'
        required: false
      probe_only:
        description: 'true = read-only hub inventory probe instead of the e2e suite (diagnose hub state)'
        required: false
        default: 'false'
      reboot_first:
        description: 'probe_only: true = reboot the test hub before probing (clears a stuck per-app load throttle / LimitExceededException)'
        required: false
        default: 'false'
      disable_app_id:
        description: 'probe_only: installed-app id to DISABLE (red-X, not delete) after the probe, via the watchdog hub_set_app_disabled'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  # The hub-less self-deploy recovery guard (issue #237) is NOT here: running untrusted
  # PR code in this privileged pull_request_target workflow is a cache-poisoning vector,
  # so it lives in the unprivileged self-deploy-recovery.yml (pull_request) instead --
  # it needs no secret and no hub, and runs on every PR there in a safe context.

  # Approval gate. The environment NAME is chosen from the PR author's relationship to
  # the repo:
  #   - trusted (repo owner / org member / write-access collaborator, plus @level99 and
  #     @kingpanther13 named explicitly, and any maintainer workflow_dispatch) -> the
  #     `e2e-auto` environment, which has no protection rules, so this job passes
  #     immediately and e2e runs automatically.
  #   - everyone else -> the `e2e-approval` environment, whose required-reviewer rule
  #     pauses the run behind GitHub's "Review pending deployments" button until the
  #     maintainer approves. Permanent (every run, not just first-time), e2e-only.
  # author_association is computed server-side and can't be spoofed, and the workflow
  # file is taken from the base branch under pull_request_target, so a PR can't edit
  # this gate to promote itself.
  #
  # SEPARATE job from `e2e` on purpose: it holds no hub lease and no concurrency group,
  # so an outside PR sitting unapproved can't stall the shared test hub for trusted
  # runs. e2e starts only once this job succeeds (`needs`).
  approve:
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' || github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'COLLABORATOR' || github.event.pull_request.user.login == 'level99' || github.event.pull_request.user.login == 'kingpanther13') && 'e2e-auto' || 'e2e-approval' }}
    steps:
      - name: Gate
        run: echo "e2e approved to run against the shared test hub"

  # Read-only hub inventory dump (dispatch with probe_only=true). Diagnoses test-hub
  # state -- devices, apps, rules, jobs, memory, watchdog flags -- without deploying or
  # mutating anything beyond one labeled command round-trip on the BAT scaffold switch.
  # Shares the hub-e2e concurrency group so it never overlaps a live e2e run.
  probe:
    needs: [approve]
    if: inputs.probe_only == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: hub-e2e
      cancel-in-progress: false
    env:
      MCP_URL: ${{ secrets.LEVEL99_TEST_HUB_MCP_URL }}
      WATCHDOG_URL: ${{ secrets.WATCHDOG_MCP_URL }}
    steps:
      - uses: actions/checkout@v6
      - name: Mask access tokens
        run: |
          for U in "$MCP_URL" "$WATCHDOG_URL"; do
            TOKEN="$(echo "$U" | sed -nE 's|.*access_token=(.*)|\1|p')"
            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
            fi
          done
      - name: Reboot test hub first (reboot_first=true)
        if: inputs.reboot_first == 'true'
        # Clears the platform's sticky per-app load throttle (LimitExceededException "generates
        # excessive hub load") -- community-confirmed to reset only on reboot. Fired through the
        # normal destructive-ops gateway; the probe below then captures the post-reboot state.
        run: |
          set -euo pipefail
          echo "Sending hub_reboot to the test hub..."
          RESP=$(curl -sS --max-time 60 -X POST "$MCP_URL" -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":99,"method":"tools/call","params":{"name":"hub_manage_destructive_ops","arguments":{"tool":"hub_reboot","args":{"confirm":true}}}}' || true)
          echo "reboot response head: $(printf '%s' "$RESP" | head -c 300 | tr '\n' ' ')"
          if printf '%s' "$RESP" | grep -qiE "SAFETY CHECK|BACKUP REQUIRED|Write tools are disabled"; then
            echo "::error::hub_reboot was REFUSED by the destructive-ops gate -- see response above."
            exit 1
          fi
          echo "Waiting 60s for the hub to go down, then polling for recovery (up to ~8 min)..."
          sleep 60
          attempt=1
          until curl -sS --fail --max-time 20 -X POST "$MCP_URL" -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":100,"method":"tools/call","params":{"name":"hub_get_info","arguments":{}}}' \
              | jq -e '.result.content[0].text' >/dev/null 2>&1; do
            if [ "$attempt" -ge 32 ]; then
              echo "::error::Test hub did not come back within ~8 min of the reboot."
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 15
          done
          echo "Hub is back after reboot (poll attempt ${attempt})."
      - name: Probe hub inventory
        run: bash .github/scripts/mcp_probe_hub.sh
      - name: Disable installed app (disable_app_id set)
        if: inputs.disable_app_id != ''
        # Parks an app via its disabled flag (the admin UI red-X) WITHOUT deleting it, through the
        # watchdog's hub_set_app_disabled (POST /installedapp/disable + read-back verification).
        run: |
          set -euo pipefail
          if ! printf '%s' "${{ inputs.disable_app_id }}" | grep -qE '^[0-9]+$'; then
            echo "::error::disable_app_id must be numeric"; exit 1
          fi
          RPC=$(jq -nc --arg id "${{ inputs.disable_app_id }}" \
            '{jsonrpc:"2.0",id:1,method:"tools/call",params:{name:"hub_set_app_disabled",arguments:{appId:$id,disable:true,confirm:true}}}')
          RESP=$(curl -sS --max-time 60 -X POST "$WATCHDOG_URL" -H "Content-Type: application/json" --data-binary "$RPC")
          TEXT=$(printf '%s' "$RESP" | jq -r '.result.content[0].text // empty')
          echo "disable result: $TEXT"
          printf '%s' "$TEXT" | jq -e '.success == true' >/dev/null || {
            echo "::error::hub_set_app_disabled did not verify the flip -- see result above."; exit 1; }

  e2e:
    needs: [approve]
    if: inputs.probe_only != 'true'
    runs-on: ubuntu-latest
    # Bounds the whole job (lease wait + hold). Kept equal to the lease TTL in
    # lease_acquire.sh: the lease is claimed only AFTER any wait, so the
    # post-acquisition window always stays within the 30-min TTL and the job can't
    # outlive its own lease and let another run trample state mid-test. lease_acquire.sh
    # now WAITS for a busy lease (LEASE_WAIT_TIMEOUT_S, default 600s) and claims it when
    # it frees instead of failing fast; that wait spends part of this same window, so a
    # run that waits out most of it for a stuck lease times out red rather than running a
    # truncated test.
    timeout-minutes: 30

    # Serialize against the shared test hub at the JOB level (not workflow level) so the
    # `approve` gate -- which may sit waiting on a human reviewer -- never holds this
    # group. This group is the PRIMARY serializer: it stops two CI e2e jobs from running
    # against the single-tenant hub at once, so they never even both enter lease_acquire's
    # wait loop. lease_acquire.sh's in-script wait (it polls a busy lease, it does NOT
    # abort on sight) is the SECONDARY net -- it covers a manual hub session GitHub's
    # `concurrency` can't see. Don't cancel in-progress: a running job holds the lease and
    # needs to release it cleanly via its `if: always()` cleanup step.
    concurrency:
      group: hub-e2e
      cancel-in-progress: false

    env:
      MCP_URL: ${{ secrets.LEVEL99_TEST_HUB_MCP_URL }}
      # The standing dead-man watchdog is a SEPARATE on-hub app with its own cloud MCP
      # endpoint (secret WATCHDOG_MCP_URL). The v2 watchdog drives the backup / PR-install /
      # clean-disarm-restore plumbing over THIS url, independent of the MCP server under test
      # ($MCP_URL) -- so a deploy that bricks the server under test can still be restored
      # through the watchdog's own live endpoint.
      WATCHDOG_URL: ${{ secrets.WATCHDOG_MCP_URL }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.pr_number && format('refs/pull/{0}/head', inputs.pr_number) || github.event.pull_request.head.sha || github.ref }}

      - name: Check secret availability + skip if absent
        # MCP_URL / WATCHDOG_URL are empty only when the secrets aren't configured at all --
        # e.g. someone forked the whole project to a repo without the donated test hub, or
        # @level99 has not yet provisioned the separate watchdog endpoint. (Under
        # pull_request_target on the upstream repo the run is in trusted context, so the
        # secrets ARE present for both trusted and approved fork PRs; fork-PR secret
        # stripping does NOT apply here the way it does to a plain pull_request trigger.)
        # In the no-secret case we skip cleanly rather than fail red -- e2e must not go red
        # before WATCHDOG_MCP_URL exists. GitHub doesn't allow `secrets` in job-level `if:`
        # conditions, so the check happens here as a step output and gates everything below.
        id: gate
        run: |
          if [ -z "$MCP_URL" ]; then
            echo "::notice::LEVEL99_TEST_HUB_MCP_URL secret not available — skipping E2E (expected on repos without the test hub configured)"
            echo "available=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$WATCHDOG_URL" ]; then
            echo "::notice::WATCHDOG_MCP_URL secret not available — skipping E2E (the v2 dead-man watchdog endpoint is not provisioned yet; this is expected until @level99 sets WATCHDOG_MCP_URL)"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.available == 'true'
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        if: steps.gate.outputs.available == 'true'
        run: pip install requests

      - name: Mask access token in subsequent log lines
        if: steps.gate.outputs.available == 'true'
        # Secrets are auto-masked, but the URL parsing below can split the
        # token out into a separate string that isn't recognized as the
        # original secret value. Force-mask both endpoints' tokens.
        run: |
          for U in "$MCP_URL" "$WATCHDOG_URL"; do
            TOKEN="$(echo "$U" | sed -nE 's|.*access_token=(.*)|\1|p')"
            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
            fi
          done

      - name: Parse MCP_URL into HUBITAT_* env vars
        if: steps.gate.outputs.available == 'true'
        # tests/e2e_test.py expects these three env vars (see its docstring).
        # MCP_URL format: https://cloud.hubitat.com/api/<UUID>/apps/<APPID>/mcp?access_token=<TOKEN>
        run: |
          # Note: regional cloud endpoints (e.g. eu.cloud.hubitat.com) are not yet supported —
          # update the regex if Hubitat adds them.
          if [[ ! "$MCP_URL" =~ ^https://cloud\.hubitat\.com/api/[^/]+/apps/[0-9]+/mcp\?access_token=.+$ ]]; then
            echo "::error::MCP_URL does not match the expected cloud-endpoint shape — refusing to parse a malformed value into HUBITAT_* env vars."
            exit 1
          fi
          BASE=$(echo "$MCP_URL"  | sed -E 's|(https://cloud\.hubitat\.com/api/[^/]+)/apps/([0-9]+)/mcp\?access_token=(.*)|\1|')
          APPID=$(echo "$MCP_URL" | sed -E 's|(https://cloud\.hubitat\.com/api/[^/]+)/apps/([0-9]+)/mcp\?access_token=(.*)|\2|')
          TOKEN=$(echo "$MCP_URL" | sed -E 's|(https://cloud\.hubitat\.com/api/[^/]+)/apps/([0-9]+)/mcp\?access_token=(.*)|\3|')
          {
            echo "HUBITAT_HUB_URL=$BASE"
            echo "HUBITAT_APP_ID=$APPID"
            echo "HUBITAT_ACCESS_TOKEN=$TOKEN"
          } >> "$GITHUB_ENV"

      - name: Watchdog health check (HALT if unreachable / not installed)
        if: steps.gate.outputs.available == 'true'
        # The v2 dead-man watchdog is a STANDALONE on-hub app reachable on its own cloud MCP
        # endpoint ($WATCHDOG_URL) -- the same tool surface as the main server (hub_get_info,
        # tools/list, etc.). Everything below (backup+arm, PR install, clean-disarm restore)
        # drives the hub THROUGH that endpoint, so if it is unreachable or the watchdog app
        # isn't installed there is no safety net and we must HALT before mutating the hub --
        # never deploy PR code we can't roll back. NOT continue-on-error: a dead watchdog
        # endpoint is a hard stop, not a skip.
        run: |
          set -euo pipefail
          echo "Probing the watchdog endpoint (tools/list)..."
          LIST_RPC='{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}'
          RESP=$(curl -sS --max-time 60 -X POST "$WATCHDOG_URL" \
            -H "Content-Type: application/json" \
            --data-binary "$LIST_RPC" || true)
          if ! printf '%s' "$RESP" | jq -e '.result.tools | type == "array"' >/dev/null 2>&1; then
            echo "::error::Watchdog endpoint ($WATCHDOG_URL) did not return a tools/list result. The v2 dead-man watchdog is unreachable or not installed on the test hub — HALTING before any hub mutation (no safety net to roll back a bad deploy). Body head: $(printf '%s' "$RESP" | head -c 300 | tr '\n' ' ')"
            exit 1
          fi
          echo "Confirming the watchdog responds to hub_get_info..."
          INFO_RPC='{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"hub_get_info","arguments":{}}}'
          INFO=$(curl -sS --max-time 60 -X POST "$WATCHDOG_URL" \
            -H "Content-Type: application/json" \
            --data-binary "$INFO_RPC" || true)
          if ! printf '%s' "$INFO" | jq -e '.result.content[0].text // empty' >/dev/null 2>&1; then
            echo "::error::Watchdog endpoint reachable but hub_get_info returned no result — the watchdog app may be mis-installed. HALTING. Body head: $(printf '%s' "$INFO" | head -c 300 | tr '\n' ' ')"
            exit 1
          fi
          echo "WATCHDOG_HEALTHY — endpoint reachable and hub_get_info OK"

      - name: Acquire test hub lease
        if: steps.gate.outputs.available == 'true'
        run: bash .github/scripts/lease_acquire.sh "ci-run-${{ github.run_id }}"

      - name: Pre-run hub status probe
        if: steps.gate.outputs.available == 'true'
        # Standard since the 2026-06-11 LimitExceededException hunt: capture the hub's exact
        # pre-run state (memory, jobs, error logs, devices, app instances, live command check)
        # inside our lease window, so a degraded starting state is visible in every run's log.
        # Diagnostic only -- must never fail the run.
        continue-on-error: true
        run: bash .github/scripts/mcp_probe_hub.sh

      - name: Configure test environment (capture pre-state + enable toggles)
        if: steps.gate.outputs.available == 'true'
        # Captures enableCustomRuleEngine / enableRead
        # to $RUNNER_TEMP/mcp_pre_state.json, then enables all three so the
        # tests can exercise the rule engine + hub admin read paths regardless
        # of the test hub's prior toggle state. Refuses if Developer Mode
        # itself is off (UI-only to enable).
        run: bash .github/scripts/mcp_setup_env.sh

      - name: Clear stale watchdog flag
        if: steps.gate.outputs.available == 'true'
        # Best-effort: write {armed:false} to the dead-man flag so a CRASHED prior run's still-armed
        # flag can't fire its auto-restore during THIS run's deploy. continue-on-error because the
        # watchdog/flag may not exist yet (first run on a hub, or watchdog not installed) -- that's
        # fine; there's nothing to clear. The real arm happens later, after a fresh >1MB pre-deploy
        # backup exists. Written over the watchdog's own endpoint ($WATCHDOG_URL).
        continue-on-error: true
        run: |
          curl -sS --max-time 60 -X POST "$WATCHDOG_URL" \
            -H "Content-Type: application/json" \
            --data-binary '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"hub_write_file","arguments":{"fileName":"e2e-deadman-v2.json","content":"{\"armed\":false,\"clearedBy\":\"pre-run-stale-flag-clear\"}","confirm":true}}}' \
            >/dev/null || echo "::notice::stale-flag clear call failed/absent (watchdog/flag may not exist yet) -- continuing"

      - name: Compute PR source URL for importUrl deploy
        if: steps.gate.outputs.available == 'true'
        # The hub fetches the PR branch's raw source itself (importUrl mode), so the
        # ~1.5MB blob never crosses the cloud gateway. Resolve head repo + SHA for the
        # three trigger shapes (PR, dispatch-with-pr_number, plain dispatch).
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_INPUT: ${{ inputs.pr_number }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          DEFAULT_REPO: ${{ github.repository }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # pull_request_target carries the same pull_request payload (head repo + sha),
          # so treat it identically to pull_request -- otherwise we'd fall through to the
          # base repo/sha and deploy BASE source instead of the PR's.
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ]; then
            REPO="$PR_HEAD_REPO"; SHA="$PR_HEAD_SHA"
          elif [ -n "${PR_INPUT:-}" ]; then
            # Validate the dispatch input before it reaches gh api.
            if ! printf '%s' "$PR_INPUT" | grep -qE '^[0-9]+$'; then
              echo "::error::pr_number must be numeric"; exit 1
            fi
            REPO=$(gh api "repos/$DEFAULT_REPO/pulls/$PR_INPUT" --jq '.head.repo.full_name')
            SHA=$(gh api "repos/$DEFAULT_REPO/pulls/$PR_INPUT" --jq '.head.sha')
          else
            REPO="$DEFAULT_REPO"; SHA="$DEFAULT_SHA"
          fi
          # Defense-in-depth: only a 40-hex SHA and an owner/name repo may form the
          # URL, so a malformed value can't inject into $GITHUB_ENV or the URL.
          if ! printf '%s' "$SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::unexpected head SHA shape"; exit 1
          fi
          if ! printf '%s' "$REPO" | grep -qE '^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$'; then
            echo "::error::unexpected head repo shape"; exit 1
          fi
          URL="https://raw.githubusercontent.com/$REPO/$SHA/hubitat-mcp-server.groovy"
          echo "PR_SOURCE_URL=$URL" >> "$GITHUB_ENV"
          # Same validated REPO/SHA, split into the (baseUrl, ref) form hub_update_package
          # takes -- the dev-tool validation step below builds the identical URL on-hub.
          echo "PR_RAW_BASE=https://raw.githubusercontent.com/$REPO" >> "$GITHUB_ENV"
          echo "PR_HEAD_SHA_RESOLVED=$SHA" >> "$GITHUB_ENV"
          echo "::notice::importUrl deploy source: $URL"
          # CANONICAL MAIN: resolve the BASE repo's main-branch HEAD (the known-good baseline the hub
          # should hold). The arm refreshes the hub to this when main's SHA changes or the hub has drifted,
          # so the cache it then takes is canonical main -- not whatever happened to be live. MAIN_CHARS is
          # main's source character length (the deploy landing target); MAIN_SHA gates "did main change?".
          MAIN_SHA=$(gh api "repos/$DEFAULT_REPO/branches/main" --jq '.commit.sha')
          if ! printf '%s' "$MAIN_SHA" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::unexpected main-branch SHA shape: $MAIN_SHA"; exit 1
          fi
          MAIN_URL="https://raw.githubusercontent.com/$DEFAULT_REPO/$MAIN_SHA/hubitat-mcp-server.groovy"
          MAIN_CHARS=$(curl -fsSL "$MAIN_URL" | LC_ALL=C.UTF-8 wc -m | tr -d '[:space:]')
          if ! printf '%s' "$MAIN_CHARS" | grep -qE '^[0-9]+$' || [ "$MAIN_CHARS" -lt 100000 ]; then
            echo "::error::canonical main source char count looks wrong ($MAIN_CHARS) -- refusing to drive a main refresh"; exit 1
          fi
          echo "MAIN_SOURCE_URL=$MAIN_URL" >> "$GITHUB_ENV"
          echo "MAIN_SHA=$MAIN_SHA" >> "$GITHUB_ENV"
          echo "MAIN_CHARS=$MAIN_CHARS" >> "$GITHUB_ENV"
          echo "::notice::canonical main: $MAIN_URL (${MAIN_CHARS} chars)"

      # The dead-man watchdog is NOT deployed by e2e: the maintainer manages the watchdog app on the
      # test hub out-of-band (direct hub access). e2e never writes to the watchdog app -- it only drives
      # the standing watchdog's endpoint to arm/install/restore. A PR that changes the watchdog source
      # (e2e-deadman-watchdog-v2.groovy) is validated by WatchdogV2Spec plus that out-of-band deploy,
      # not by an in-run self-update.

      # Backup the known-good MCP server source and ARM the standing v2 dead-man watchdog for THIS
      # run, both driven over the watchdog's own endpoint ($WATCHDOG_URL). The arm script captures a
      # fresh >1MB known-good backup hub-side and asserts it is present before writing the armed flag
      # (ARM_WINDOW_MS deadline, deliberately > the job timeout), so the watchdog can only fire its
      # restore AFTER GitHub has already killed a hung/dead job, never mid-live-run. The always()
      # "Disarm dead-man watchdog (final)" step below clears it and restores main before the lease is
      # released. Placed BEFORE the PR install so the rollback target exists before the hub is mutated.
      - name: Backup + arm dead-man watchdog
        if: steps.gate.outputs.available == 'true'
        env:
          PR_RAW_BASE: ${{ env.PR_RAW_BASE }}
          PR_HEAD_SHA_RESOLVED: ${{ env.PR_HEAD_SHA_RESOLVED }}
          MAIN_SOURCE_URL: ${{ env.MAIN_SOURCE_URL }}
          MAIN_SHA: ${{ env.MAIN_SHA }}
          MAIN_CHARS: ${{ env.MAIN_CHARS }}
        run: bash .github/scripts/mcp_arm_watchdog.sh

      # Install THIS PR's source onto the test hub through the watchdog's install plumbing
      # ($WATCHDOG_URL). Replaces the old separate install-libraries / deploy-source / verify-deploy /
      # install-bundle-HPM steps: the watchdog endpoint is a single driver of the same loopback
      # restore/install plumbing, so it installs the package bundle the HPM way (the bundle delivers
      # every #include library -- no separate per-library install), then lands + verifies the app
      # source last (HPM's bundle -> app order) in one step. Blocking:
      # a failed PR install means the tests would run against stale/broken hub code.
      - name: Watchdog - install PR
        if: steps.gate.outputs.available == 'true'
        env:
          PR_RAW_BASE: ${{ env.PR_RAW_BASE }}
          PR_HEAD_SHA_RESOLVED: ${{ env.PR_HEAD_SHA_RESOLVED }}
        run: bash .github/scripts/mcp_watchdog_deploy.sh

      - name: Run E2E tests
        if: steps.gate.outputs.available == 'true'
        env:
          # Defer per-test native-rule fixture deletes to the disarm step's force sweep (over
          # WATCHDOG_URL, overlapping the restore-poll wait) instead of the test critical path.
          # NOT set on the post-restore --cleanup-only step below, which stays the idempotent backstop.
          E2E_DEFER_NATIVE_DELETES: '1'
        run: python tests/e2e_test.py

      # The install above landed THIS PR's app on the hub, so hub_update_package now
      # exists there. Exercise its discovery path live (dryRun: fetch PR source ->
      # parse #includes -> resolve self app-class) with ZERO writes. This is a REAL
      # blocking gate -- e2e passing is what shows the tool works. It runs AFTER the
      # e2e suite so a tool failure can't skip the suite; the cleanup/restore steps
      # below all use `if: always()`, so the hub is restored regardless. The full
      # write path (real library + #include + compile equivalence) is validated by the
      # watchdog PR-install step above plus the smokeTestMarker / hub_list_libraries
      # assertions in tests/e2e_test.py.
      - name: Validate hub_update_package dev tool (dryRun)
        if: steps.gate.outputs.available == 'true'
        env:
          PR_RAW_BASE: ${{ env.PR_RAW_BASE }}
          PR_HEAD_SHA_RESOLVED: ${{ env.PR_HEAD_SHA_RESOLVED }}
        run: bash .github/scripts/mcp_validate_package_tool.sh

      # Disarm the v2 dead-man watchdog -- this is also what RESTORES main: it pushes the pre-deploy
      # known-good snapshot back through the watchdog's own restore plumbing ($WATCHDOG_URL) (replacing
      # both the old disarm AND the old "Restore previous app source" step). It runs FIRST in teardown,
      # BEFORE the MCP_URL-based cleanup/settings-restore below, on purpose: if the PR compiled but broke
      # the main MCP runtime, those MCP_URL steps would fail against the broken PR app -- restoring main
      # first means they operate on a healthy server. The disarm is FIRE-AND-FORGET: it writes
      # {armed:false,intent:disarm}, reads the flag back and asserts that landed (armed==false +
      # intent==disarm), reaps the deferred native-rule fixtures, and exits. The watchdog restores main
      # asynchronously from the canonical install URLs in the flag manifest; CI does not wait for the
      # restore or assert restoreResult/source-length here. A clean disarm also prevents handing the
      # next run an armed flag.
      - name: Disarm dead-man watchdog (restore main)
        if: always() && steps.gate.outputs.available == 'true'
        run: bash .github/scripts/mcp_disarm_watchdog.sh

      - name: Cleanup BAT_E2E_ artifacts
        if: always() && steps.gate.outputs.available == 'true'
        # Defensive — e2e_test.py cleans up after itself in the happy path,
        # but a crashed run can strand virtual devices / rules / variables
        # under the BAT_E2E_ prefix. This sweeps anything left over. Runs AFTER the
        # disarm restored main, so it operates on a healthy server over MCP_URL.
        run: python tests/e2e_test.py --cleanup-only

      - name: Restore test environment (settings back to pre-run state)
        if: always() && steps.gate.outputs.available == 'true'
        # Tolerant of missing pre-state file (early-exit no-op) so a setup
        # failure before capture doesn't propagate here. Runs after the disarm so
        # MCP_URL points at restored main, not a possibly-broken PR app.
        run: bash .github/scripts/mcp_restore_env.sh

      - name: Post-run hub status probe
        if: always() && steps.gate.outputs.available == 'true'
        # The pre-run probe's counterpart: capture what the run LEFT BEHIND (stranded artifacts,
        # load-limiter trips in the error log, memory descent, watchdog flag state) while we still
        # hold the lease. Runs after the cleanup step's restore-completion gate, so the hub is
        # quiet. Diagnostic only -- must never fail the run.
        continue-on-error: true
        run: bash .github/scripts/mcp_probe_hub.sh

      - name: Release test hub lease
        if: always() && steps.gate.outputs.available == 'true'
        run: bash .github/scripts/lease_release.sh
