name: Rebuild library bundle
# Post-merge owner of bundles/mcp-libraries.zip (issue #209). PRs do NOT commit the
# bundle zip anymore -- every-PR binary rebuilds made any two library-touching PRs
# conflict on the zip. Instead this workflow rebuilds the deterministic zip from
# libraries/*.groovy after each merge to main and commits it when it drifted, so the
# stable raw-main URL in packageManifest.json bundles[].location always serves a zip
# that matches main's library source. PR e2e does not depend on the committed zip
# either: mcp_watchdog_deploy.sh builds the PR's zip in CI and stages it onto the hub
# through the watchdog (base64 chunks -> File Manager -> local-URL bundle install).
on:
  push:
    branches: [main]
    paths:
      - 'libraries/**'
      - 'tools/build-bundle.py'
  workflow_dispatch:

permissions:
  contents: write

# Serialize against the release bot (same group as release.yml) so the two
# post-merge committers never race a push against each other.
concurrency:
  group: post-merge
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          # Push via the release deploy key: main's ruleset (required status checks)
          # rejects a GITHUB_TOKEN push (GH013 -- proven by run 27445202166), exactly
          # as release.yml documents for its own bookkeeping push.
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Rebuild and commit the bundle zip if drifted
        run: |
          set -euo pipefail
          python tools/build-bundle.py
          if git diff --quiet -- bundles/; then
            echo "Bundle zip already matches main's library source -- nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bundles/
          git commit -m "chore: rebuild library bundle zip from main's library source"
          # The deploy-key push DOES retrigger push workflows (unlike GITHUB_TOKEN):
          # release.yml skips bot-authored pushes via its recursion guard, and this
          # workflow + publish-bundle-artifact filter on libraries/** which a bundles/-only
          # commit never matches. The post-merge concurrency group serializes us against
          # the release bot, but a release commit may still land between our checkout and
          # push, so retry on a rejected push.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Bundle commit pushed (attempt $attempt)."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) -- rebasing onto current main and retrying."
            git pull --rebase origin main
          done
          echo "::error::Could not push the rebuilt bundle zip after 3 attempts."
          exit 1
      - name: Alarm on failure (stale zip on main breaks raw-main installs)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create -R "${GITHUB_REPOSITORY}"             --title "rebuild-bundle FAILED on main -- committed bundle zip may be stale"             --body "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

While this is unresolved, the committed bundles/mcp-libraries.zip on main may not match main's libraries/ -- raw-main consumers (HPM installs/updates, manual installs, the e2e dead-man restore, hub_update_package at ref=main fallback) can fetch a bundle that cannot satisfy the app's #includes. Fix the workflow or push the rebuilt zip manually (python tools/build-bundle.py)."             || echo "::error::could not open the alarm issue -- the committed zip on main may be STALE; rebuild and push it manually."

